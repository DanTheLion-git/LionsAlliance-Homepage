<!DOCTYPE html>
<html lang="en" id="root">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Lions Alliance — Dashboard</title>
  <style>
    /* ── Design tokens (mirrors thelionsalliance.com) ── */
    :root {
      --bg:               #0b0b0f;
      --bg-elevated:      #17171f;
      --bg-input:         #1e1e28;
      --border:           #2a2a35;
      --border-hover:     #3a3a48;
      --accent:           #4ade80;
      --accent-dim:       #16a34a;
      --accent-soft:      rgba(74, 222, 128, 0.12);
      --fg:               #f5f5f7;
      --fg-muted:         #9a9aaa;
      --radius:           14px;
      --radius-sm:        8px;
      --radius-pill:      999px;
      --shadow-card:      0 4px 20px rgba(0,0,0,0.35);
      --shadow-hover:     0 12px 36px rgba(0,0,0,0.55);
      --transition:       0.15s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: radial-gradient(ellipse at top, #1a1a26 0%, #050509 55%, #000 100%);
      min-height: 100vh;
      color: var(--fg);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
    }

    /* ── Layout ── */
    .container { max-width: 960px; margin: 0 auto; padding: 0 24px; }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      background: rgba(11,11,15,0.85);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 10;
    }
    header .container {
      display: flex; align-items: center; justify-content: space-between;
      height: 60px;
    }
    .logo {
      font-size: 1.05rem; font-weight: 700; color: var(--fg);
      text-decoration: none; letter-spacing: -0.3px;
    }
    .logo span { color: var(--accent); }

    /* ── Hero ── */
    .hero {
      text-align: center; padding: 64px 24px 48px;
    }
    .hero-badge {
      display: inline-block;
      border: 1px solid var(--border);
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.14em;
      padding: 4px 14px; border-radius: var(--radius-pill);
      margin-bottom: 22px;
    }
    .hero h1 {
      font-size: clamp(1.9rem, 5vw, 3rem);
      font-weight: 700; line-height: 1.1;
      letter-spacing: -0.5px; margin-bottom: 14px;
    }
    .hero h1 .accent { color: var(--accent); }
    .hero p {
      font-size: 1rem; color: var(--fg-muted);
      max-width: 400px; margin: 0 auto 32px;
    }
    .hero-divider {
      width: 44px; height: 3px;
      background: linear-gradient(90deg, var(--accent-dim), var(--accent));
      border-radius: var(--radius-pill); margin: 0 auto 48px;
    }

    /* ── Status dot ── */
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #4b4b5a; flex-shrink: 0;
      transition: background var(--transition);
    }
    .status-dot.online  { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .status-dot.offline { background: #ef4444; }

    /* ── Service cards grid ── */
    #cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 48px;
    }

    .service-card {
      position: relative;
      display: flex; flex-direction: column;
      padding: 22px 22px 18px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      text-decoration: none; color: var(--fg);
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
      cursor: pointer;
    }
    .service-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: var(--card-accent, var(--accent));
    }
    .service-card .card-top {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 14px;
    }
    .card-icon {
      font-size: 1.75rem; line-height: 1;
      width: 46px; height: 46px;
      display: flex; align-items: center; justify-content: center;
      background: var(--icon-bg, var(--accent-soft));
      border-radius: var(--radius-sm);
    }
    .card-actions { display: flex; gap: 6px; opacity: 0; transition: opacity var(--transition); }
    .service-card:hover .card-actions { opacity: 1; }
    .card-action-btn {
      background: none; border: 1px solid var(--border-hover);
      color: var(--fg-muted); border-radius: 6px;
      width: 26px; height: 26px; cursor: pointer; font-size: 0.75rem;
      display: flex; align-items: center; justify-content: center;
      transition: background var(--transition), color var(--transition);
    }
    .card-action-btn:hover { background: var(--bg-input); color: var(--fg); }
    .card-action-btn.delete:hover { border-color: #ef4444; color: #ef4444; }

    .card-name { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
    .card-desc { font-size: 0.8rem; color: var(--fg-muted); flex: 1; margin-bottom: 14px; line-height: 1.5; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; }
    .card-port {
      font-size: 0.75rem; font-family: 'SF Mono', 'Fira Code', monospace;
      color: var(--fg-muted); background: rgba(255,255,255,0.05);
      border: 1px solid var(--border); padding: 2px 8px;
      border-radius: var(--radius-pill);
    }
    .card-open-link {
      font-size: 0.78rem; font-weight: 600;
      color: var(--card-accent, var(--accent));
      text-decoration: none;
      display: flex; align-items: center; gap: 4px;
    }
    .card-open-link::after { content: '→'; }

    /* ── Add Service button + modal ── */
    .add-btn {
      display: flex; align-items: center; gap: 8px;
      background: var(--accent-soft); border: 1px dashed var(--accent-dim);
      color: var(--accent); border-radius: var(--radius); padding: 22px;
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
      transition: background var(--transition), border-color var(--transition);
      justify-content: center;
    }
    .add-btn:hover { background: rgba(74,222,128,0.18); border-color: var(--accent); }
    .add-btn-icon { font-size: 1.4rem; }

    /* ── Modal overlay ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px 28px 24px;
      width: 100%; max-width: 420px;
      transform: translateY(12px); transition: transform 0.2s;
      box-shadow: 0 24px 60px rgba(0,0,0,0.7);
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; }
    .form-row { margin-bottom: 14px; }
    .form-row label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--fg-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.08em; }
    .form-row input {
      width: 100%; background: var(--bg-input); border: 1px solid var(--border);
      color: var(--fg); border-radius: var(--radius-sm); padding: 9px 12px;
      font-size: 0.9rem; outline: none;
      transition: border-color var(--transition);
    }
    .form-row input:focus { border-color: var(--accent); }
    .form-row-half { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .color-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
    .color-swatch {
      width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent;
      transition: transform var(--transition), border-color var(--transition);
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.selected { border-color: var(--fg); transform: scale(1.15); }
    .modal-actions { display: flex; gap: 10px; margin-top: 22px; }
    .btn-primary {
      flex: 1; background: var(--accent); color: #000; border: none;
      border-radius: var(--radius-pill); padding: 10px 20px;
      font-size: 0.9rem; font-weight: 700; cursor: pointer;
      transition: opacity var(--transition);
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-secondary {
      background: none; border: 1px solid var(--border); color: var(--fg-muted);
      border-radius: var(--radius-pill); padding: 10px 20px;
      font-size: 0.9rem; cursor: pointer;
      transition: border-color var(--transition), color var(--transition);
    }
    .btn-secondary:hover { border-color: var(--border-hover); color: var(--fg); }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border); text-align: center;
      padding: 24px; color: var(--fg-muted); font-size: 0.82rem;
    }

    /* ── Loading skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-elevated) 25%, var(--bg-input) 50%, var(--bg-elevated) 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite;
      border-radius: var(--radius); height: 160px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    @media (max-width: 480px) {
      #cards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <a href="/" class="logo">The Lions <span>Alliance</span></a>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="hero">
        <span class="hero-badge">Raspberry Pi Dashboard</span>
        <h1>Your <span class="accent">home server</span>,<br>all in one place.</h1>
        <p>Access all running services directly from here.</p>
        <div class="hero-divider"></div>
      </div>

      <div id="cards-grid">
        <!-- skeletons while loading -->
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>

      <!-- Add service card (always last) -->
      <div style="margin-bottom: 48px;">
        <button class="add-btn" id="open-add-modal">
          <span class="add-btn-icon">＋</span>
          Add Service
        </button>
      </div>
    </div>
  </main>

  <footer>
    <div id="yr"></div>
    <script>document.getElementById('yr').textContent = '© ' + new Date().getFullYear() + ' The Lions Alliance';</script>
  </footer>

  <!-- Add / Edit Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h2 id="modal-title">Add Service</h2>
      <input type="hidden" id="edit-id" value="" />
      <div class="form-row">
        <label>Service Name</label>
        <input type="text" id="field-name" placeholder="e.g. Food Tracker" maxlength="40" />
      </div>
      <div class="form-row">
        <label>Description <span style="font-weight:400;text-transform:none;">(optional)</span></label>
        <input type="text" id="field-desc" placeholder="Short description" maxlength="80" />
      </div>
      <div class="form-row-half">
        <div class="form-row" style="margin:0">
          <label>Port</label>
          <input type="number" id="field-port" placeholder="4242" min="1" max="65535" />
        </div>
        <div class="form-row" style="margin:0">
          <label>Icon (emoji)</label>
          <input type="text" id="field-icon" placeholder="🔧" maxlength="4" />
        </div>
      </div>
      <div class="form-row">
        <label>Accent Colour</label>
        <div class="color-row" id="color-row"></div>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" id="modal-cancel">Cancel</button>
        <button class="btn-primary" id="modal-save">Save Service</button>
      </div>
    </div>
  </div>

  <script>
    const PALETTE = [
      '#4ade80','#22c55e','#16a34a',
      '#60a5fa','#3b82f6','#2563eb',
      '#f472b6','#ec4899','#db2777',
      '#fb923c','#f97316','#ea580c',
      '#facc15','#eab308',
      '#c084fc','#a855f7','#7c3aed',
      '#94a3b8','#64748b',
    ];

    // ── State ──
    let services = [];
    let editingId = null;
    let selectedColor = PALETTE[0];

    // ── Fetch + render ──
    async function loadServices() {
      const res = await fetch('/api/services');
      services = await res.json();
      renderCards();
    }

    function renderCards() {
      const grid = document.getElementById('cards-grid');
      grid.innerHTML = '';
      services.forEach(s => {
        const card = document.createElement('div');
        card.className = 'service-card';
        card.style.setProperty('--card-accent', s.color || '#4ade80');
        card.style.setProperty('--icon-bg', hexToSoft(s.color || '#4ade80'));

        // Build the host URL using current hostname + port
        const href = `http://${location.hostname}:${s.port}`;

        card.innerHTML = `
          <div class="card-top">
            <div class="card-icon">${s.icon || '🔧'}</div>
            <div class="card-actions">
              <button class="card-action-btn" title="Edit" onclick="openEdit(${s.id}, event)">✎</button>
              <button class="card-action-btn delete" title="Delete" onclick="deleteService(${s.id}, event)">✕</button>
            </div>
          </div>
          <div class="card-name">${escHtml(s.name)}</div>
          <div class="card-desc">${escHtml(s.description || '')}</div>
          <div class="card-footer">
            <span class="card-port">:${s.port}</span>
            <a class="card-open-link" href="${href}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Open</a>
          </div>`;

        // Clicking the card body (not buttons) opens the link
        card.addEventListener('click', () => window.open(href, '_blank', 'noopener'));
        grid.appendChild(card);
      });
    }

    function hexToSoft(hex) {
      try {
        const r = parseInt(hex.slice(1,3),16);
        const g = parseInt(hex.slice(3,5),16);
        const b = parseInt(hex.slice(5,7),16);
        return `rgba(${r},${g},${b},0.14)`;
      } catch { return 'rgba(74,222,128,0.12)'; }
    }
    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Modal ──
    function buildColorRow(selected) {
      const row = document.getElementById('color-row');
      row.innerHTML = '';
      PALETTE.forEach(c => {
        const sw = document.createElement('div');
        sw.className = 'color-swatch' + (c === selected ? ' selected' : '');
        sw.style.background = c;
        sw.title = c;
        sw.addEventListener('click', () => {
          selectedColor = c;
          document.getElementById('field-icon').style.outlineColor = c;
          row.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
          sw.classList.add('selected');
        });
        row.appendChild(sw);
      });
    }

    function openModal(title, id, name, desc, port, icon, color) {
      editingId = id ?? null;
      selectedColor = color || PALETTE[0];
      document.getElementById('modal-title').textContent = title;
      document.getElementById('edit-id').value = id ?? '';
      document.getElementById('field-name').value = name || '';
      document.getElementById('field-desc').value = desc || '';
      document.getElementById('field-port').value = port || '';
      document.getElementById('field-icon').value = icon || '';
      buildColorRow(selectedColor);
      document.getElementById('modal-overlay').classList.add('open');
      document.getElementById('field-name').focus();
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
      editingId = null;
    }

    document.getElementById('open-add-modal').addEventListener('click', () =>
      openModal('Add Service', null, '', '', '', '🔧', PALETTE[0])
    );
    document.getElementById('modal-cancel').addEventListener('click', closeModal);
    document.getElementById('modal-overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('modal-overlay')) closeModal();
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    function openEdit(id, e) {
      e.stopPropagation();
      const s = services.find(x => x.id === id);
      if (!s) return;
      openModal('Edit Service', s.id, s.name, s.description, s.port, s.icon, s.color);
    }

    document.getElementById('modal-save').addEventListener('click', async () => {
      const name = document.getElementById('field-name').value.trim();
      const port = Number(document.getElementById('field-port').value);
      const icon = document.getElementById('field-icon').value.trim() || '🔧';
      const description = document.getElementById('field-desc').value.trim();
      const color = selectedColor;

      if (!name || !port) {
        document.getElementById('field-name').focus();
        return;
      }

      const body = { name, port, icon, color, description };

      if (editingId !== null) {
        await fetch(`/api/services/${editingId}`, {
          method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
        });
      } else {
        await fetch('/api/services', {
          method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
        });
      }
      closeModal();
      loadServices();
    });

    async function deleteService(id, e) {
      e.stopPropagation();
      const s = services.find(x => x.id === id);
      if (!s) return;
      if (!confirm(`Remove "${s.name}" from the dashboard?`)) return;
      await fetch(`/api/services/${id}`, { method: 'DELETE' });
      loadServices();
    }

    // ── Init ──
    loadServices();
  </script>
</body>
</html>
